<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SALO.COM — Business Analysis</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;800&family=Onest:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0a;
    --surface: #111111;
    --surface2: #1a1a1a;
    --surface3: #222222;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #ff9a03;
    --text: #f0f0f0;
    --muted: #666;
    --font-display: 'Unbounded', sans-serif;
    --font-body: 'Onest', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: none;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
  }
  .page.active { display: flex; }

  .header {
    width: 100%;
    max-width: 900px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 60px;
  }
  .logo { font-family: var(--font-display); font-weight: 800; font-size: 42px; letter-spacing: -0.5px; color: var(--accent); }
  .logo span { color: var(--text); }
  .salo-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 36px; background: var(--surface2); flex-shrink: 0; }

  .card { width: 100%; max-width: 600px; background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 48px 48px; position: relative; }
  .accent-line { width: 40px; height: 3px; background: var(--accent); border-radius: 2px; margin-bottom: 24px; }
  .card-title { font-family: var(--font-display); font-size: 28px; font-weight: 600; line-height: 1.2; margin-bottom: 8px; letter-spacing: -0.5px; }
  .card-subtitle { color: var(--muted); font-size: 14px; font-weight: 300; margin-bottom: 40px; line-height: 1.5; }

  .field { margin-bottom: 28px; }
  .field label { display: block; font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
  .field-row { display: flex; align-items: flex-start; gap: 12px; }
  .field input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: var(--font-body); font-size: 15px; padding: 14px 18px; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; }
  .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,0.08); }
  .field input::placeholder { color: #444; }
  .field-hint { font-size: 12px; color: var(--muted); white-space: nowrap; flex-shrink: 0; padding-top: 16px; }
  .hours-row { display: flex; align-items: center; gap: 12px; }
  .hours-row input { max-width: 160px; flex: none; }
  .hours-row .field-hint { padding-top: 0; }

  /* ===== CUSTOM DROPDOWN ===== */
  .dd-wrap { position: relative; flex: 1; }

  .dd-trigger {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: #444;
    font-family: var(--font-body);
    font-size: 15px;
    padding: 14px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
    user-select: none;
  }
  .dd-trigger:hover { border-color: var(--border-hover); }
  .dd-trigger.open { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(232,255,71,0.08); border-bottom-left-radius: 0; border-bottom-right-radius: 0; }
  .dd-trigger.filled { color: var(--text); }

  .dd-val { display: flex; align-items: center; gap: 8px; overflow: hidden; }
  .dd-val-icon { font-size: 17px; flex-shrink: 0; }
  .dd-val-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .dd-arrow { width: 16px; height: 16px; flex-shrink: 0; opacity: 0.45; transition: transform 0.2s, opacity 0.2s; }
  .dd-trigger.open .dd-arrow { transform: rotate(180deg); opacity: 1; }

  .dd-menu {
    display: none;
    position: absolute;
    top: 100%; left: 0; right: 0;
    background: var(--surface2);
    border: 1px solid var(--accent);
    border-top: none;
    border-bottom-left-radius: 12px;
    border-bottom-right-radius: 12px;
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 20px 48px rgba(0,0,0,0.7);
  }
  .dd-menu.open { display: block; }

  .dd-search-wrap { padding: 10px 12px; border-bottom: 1px solid var(--border); }
  .dd-search-wrap input { width: 100%; background: var(--surface3); border: 1px solid var(--border); border-radius: 7px; color: var(--text); font-family: var(--font-body); font-size: 13px; padding: 8px 12px; outline: none; transition: border-color 0.15s; }
  .dd-search-wrap input:focus { border-color: var(--accent); }
  .dd-search-wrap input::placeholder { color: #555; }

  .dd-list { max-height: 270px; overflow-y: auto; }
  .dd-list::-webkit-scrollbar { width: 4px; }
  .dd-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

  .dd-item {
    padding: 11px 18px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.1s, color 0.1s;
    border-left: 3px solid transparent;
  }
  .dd-item:hover { background: rgba(232,255,71,0.07); color: var(--accent); border-left-color: rgba(232,255,71,0.35); }
  .dd-item.selected { background: rgba(232,255,71,0.11); color: var(--accent); border-left-color: var(--accent); }
  .dd-item.hidden { display: none; }
  .dd-item-icon { font-size: 16px; flex-shrink: 0; }
  .dd-item-label { flex: 1; }
  .dd-checkmark { opacity: 0; color: var(--accent); }
  .dd-item.selected .dd-checkmark { opacity: 1; }

  .dd-empty { padding: 18px; font-size: 13px; color: var(--muted); text-align: center; display: none; }
  .dd-empty.show { display: block; }

  /* ===== BUTTONS ===== */
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; background: var(--accent); color: #0a0a0a; font-family: var(--font-display); font-size: 13px; font-weight: 600; letter-spacing: 0.5px; border: none; border-radius: 12px; padding: 16px 32px; cursor: pointer; transition: transform 0.15s, opacity 0.15s; white-space: nowrap; }
  .btn:hover { transform: translateY(-1px); opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--border-hover); background: var(--surface2); opacity: 1; }

  .form-footer { display: flex; justify-content: flex-end; margin-top: 36px; }

  .error-msg { background: rgba(255,80,80,0.1); border: 1px solid rgba(255,80,80,0.3); color: #ff8080; border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 20px; display: none; }
  .error-msg.visible { display: block; }

  .loader { display: none; flex-direction: column; align-items: center; gap: 20px; padding: 40px 0; }
  .loader.visible { display: flex; }
  .spinner { width: 48px; height: 48px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.9s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader-text { font-size: 13px; color: var(--muted); letter-spacing: 0.5px; }

  /* ===== RESULT ===== */
  .result-layout { width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 20px; }
  .score-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 40px 48px; text-align: center; position: relative; overflow: hidden; }
  .score-card::before { content: ''; position: absolute; top: -60px; left: 50%; transform: translateX(-50%); width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(232,255,71,0.12) 0%, transparent 70%); pointer-events: none; }
  .score-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .score-number { font-family: var(--font-display); font-size: 96px; font-weight: 800; line-height: 1; color: var(--accent); margin-bottom: 8px; animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both; }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .score-max { font-size: 14px; color: var(--muted); font-weight: 300; }
  .score-stars { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
  .star { font-size: 20px; opacity: 0.2; }
  .star.active { opacity: 1; }
  .comment-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px 40px; }
  .comment-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin-bottom: 16px; }
  .comment-text { font-size: 15px; line-height: 1.75; font-weight: 300; color: var(--text); animation: fadeUp 0.5s 0.3s both; }
  @keyframes fadeUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .result-footer { display: flex; justify-content: center; padding-top: 8px; }

  @media (max-width: 520px) {
    .card { padding: 32px 24px; }
    .card-title { font-size: 22px; }
    .score-number { font-size: 72px; }
  }
</style>
</head>
<body>

<div class="page active" id="page-input">
  <div class="header">
    <div class="logo">SALO</div>
    <div class="salo-img">🥩</div>
  </div>

  <div class="card">
    <div class="accent-line"></div>
    <div class="card-title">Evaluate your business</div>
    <div class="card-subtitle">Enter three characteristics — the AI will calculate a success index from 1 to 5</div>

    <div class="error-msg" id="error-msg"></div>

    <div class="loader" id="loader">
      <div class="spinner"></div>
      <div class="loader-text">Neural network is analysing data…</div>
    </div>

    <div id="form-body">
      <div class="field">
        <label>Business name</label>
        <div class="field-row">
          <input type="text" id="input-name" placeholder="E.g.: Pizza-nik" maxlength="100"/>
          <span class="field-hint">* required</span>
        </div>
      </div>

      <div class="field">
        <label>Specialization</label>
        <div class="field-row">
          <div class="dd-wrap" id="dd-wrap">
            <div class="dd-trigger" id="dd-trigger" onclick="toggleDD(event)">
              <div class="dd-val">
                <span class="dd-val-icon" id="dd-val-icon"></span>
                <span class="dd-val-text" id="dd-val-text">Select a category…</span>
              </div>
              <svg class="dd-arrow" viewBox="0 0 16 16" fill="none">
                <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </div>
            <div class="dd-menu" id="dd-menu">
              <div class="dd-search-wrap">
                <input type="text" id="dd-search" placeholder="Search…" oninput="filterDD(this.value)" onclick="event.stopPropagation()"/>
              </div>
              <div class="dd-list" id="dd-list"></div>
              <div class="dd-empty" id="dd-empty">No results found</div>
            </div>
          </div>
          <span class="field-hint">* category</span>
        </div>
      </div>

      <div class="field">
        <label>Working hours (per week)</label>
        <div class="hours-row">
          <input type="number" id="input-hours" placeholder="40" min="0" max="168"/>
          <span class="field-hint">* number from 0 to 168</span>
        </div>
      </div>

      <div class="form-footer">
        <button class="btn" onclick="analyze()">Calculate →</button>
      </div>
    </div>
  </div>
</div>

<div class="page" id="page-result">
  <div class="header">
    <div class="logo">SALO<span>.COM</span></div>
    <div class="salo-img">🥩</div>
  </div>
  <div class="result-layout">
    <div class="score-card">
      <div class="score-label">Success index</div>
      <div class="score-number" id="result-score">—</div>
      <div class="score-max">out of 5</div>
      <div class="score-stars" id="result-stars"></div>
    </div>
    <div class="comment-card">
      <div class="comment-label">AI comment</div>
      <div class="comment-text" id="result-comment"></div>
    </div>
    <div class="result-footer">
      <button class="btn btn-outline" onclick="goBack()">← Analyse again</button>
    </div>
  </div>
</div>

<script>
const CATEGORIES = [
  { value: 'Restaurants',              icon: '🍽️', label: 'Restaurants' },
  { value: 'Food',                     icon: '🥗', label: 'Food' },
  { value: 'Doctors',                  icon: '🩺', label: 'Doctors' },
  { value: 'Fitness & Instruction',    icon: '🏋️', label: 'Fitness & Instruction' },
  { value: 'Gyms',                     icon: '💪', label: 'Gyms' },
  { value: 'Real Estate',              icon: '🏠', label: 'Real Estate' },
  { value: 'Automotive',               icon: '🚗', label: 'Automotive' },
  { value: 'Auto Repair',              icon: '🔧', label: 'Auto Repair' },
  { value: 'Event Planning & Services',icon: '🎉', label: 'Event Planning & Services' },
  { value: 'Education',                icon: '📚', label: 'Education' },
];

let selectedCategory = '';

function buildDD() {
  const list = document.getElementById('dd-list');
  list.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'dd-item';
    el.dataset.value = cat.value;
    el.innerHTML = `<span class="dd-item-icon">${cat.icon}</span><span class="dd-item-label">${cat.label}</span><svg class="dd-checkmark" width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2.5 7l3.5 3.5 5.5-6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    el.addEventListener('click', () => selectCat(cat));
    list.appendChild(el);
  });
}

function toggleDD(e) {
  e.stopPropagation();
  const menu = document.getElementById('dd-menu');
  const trigger = document.getElementById('dd-trigger');
  if (menu.classList.contains('open')) {
    closeDD();
  } else {
    trigger.classList.add('open');
    menu.classList.add('open');
    const s = document.getElementById('dd-search');
    s.value = '';
    filterDD('');
    setTimeout(() => s.focus(), 40);
  }
}

function closeDD() {
  document.getElementById('dd-trigger').classList.remove('open');
  document.getElementById('dd-menu').classList.remove('open');
}

function selectCat(cat) {
  selectedCategory = cat.value;
  document.getElementById('dd-val-icon').textContent = cat.icon;
  document.getElementById('dd-val-text').textContent = cat.label;
  const trigger = document.getElementById('dd-trigger');
  trigger.classList.add('filled');
  document.querySelectorAll('.dd-item').forEach(el => {
    el.classList.toggle('selected', el.dataset.value === cat.value);
  });
  closeDD();
  document.getElementById('error-msg').classList.remove('visible');
}

function filterDD(q) {
  q = q.toLowerCase();
  let count = 0;
  document.querySelectorAll('.dd-item').forEach(el => {
    const match = !q || el.querySelector('.dd-item-label').textContent.toLowerCase().includes(q);
    el.classList.toggle('hidden', !match);
    if (match) count++;
  });
  document.getElementById('dd-empty').classList.toggle('show', count === 0);
}

document.addEventListener('click', e => {
  if (!document.getElementById('dd-wrap').contains(e.target)) closeDD();
});

// ===== ANALYZE =====
const API_URL = 'http://localhost:3001/api/analyze';

async function analyze() {
  const name = document.getElementById('input-name').value.trim();
  const hours = document.getElementById('input-hours').value.trim();
  const errEl = document.getElementById('error-msg');
  errEl.classList.remove('visible');
  if (!name) return err('Please enter the business name.');
  if (!selectedCategory) return err('Please select a specialization from the list.');
  if (hours === '') return err('Please enter the working hours.');
  const h = parseFloat(hours);
  if (isNaN(h) || h < 0 || h > 168) return err('Working hours must be a number from 0 to 168.');

  document.getElementById('form-body').style.display = 'none';
  document.getElementById('loader').classList.add('visible');

  try {
    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, specialization: selectedCategory, hours: h })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Server error');
    showResult(data.score, data.comment);
  } catch(e) {
    document.getElementById('form-body').style.display = 'block';
    document.getElementById('loader').classList.remove('visible');
    err('Could not connect to the server. Make sure the backend is running on port 3001.');
  }
}

function err(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function showResult(score, comment) {
  document.getElementById('result-score').textContent = score;
  document.getElementById('result-comment').textContent = comment;
  const st = document.getElementById('result-stars');
  st.innerHTML = '';
  for (let i = 1; i <= 5; i++) {
    const s = document.createElement('span');
    s.className = 'star' + (i <= score ? ' active' : '');
    s.textContent = '★';
    st.appendChild(s);
  }
  document.getElementById('page-input').classList.remove('active');
  document.getElementById('page-result').classList.add('active');
  window.scrollTo(0, 0);
}

function goBack() {
  document.getElementById('page-result').classList.remove('active');
  document.getElementById('page-input').classList.add('active');
  document.getElementById('loader').classList.remove('visible');
  document.getElementById('form-body').style.display = 'block';
  document.getElementById('error-msg').classList.remove('visible');
  window.scrollTo(0, 0);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDD();
  if (e.key === 'Enter' && !document.getElementById('dd-menu').classList.contains('open') && document.getElementById('page-input').classList.contains('active')) analyze();
});

buildDD();
</script>
</body>
</html>
